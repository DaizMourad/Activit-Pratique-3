<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Liste des produits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">

    <h2 class="mb-4">Liste des produits</h2>

    <!-- Barre de recherche (point 8) -->
    <form th:action="@{/products}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control" placeholder="Rechercher un produit par nom...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Rechercher</button>
        </div>
        <div class="col-auto" th:if="${keyword != null and !keyword.isEmpty()}">
            <a th:href="@{/products}" class="btn btn-outline-secondary">Réinitialiser</a>
        </div>
    </form>

    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/products/new}" class="btn btn-success">+ Ajouter un produit</a>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Nom</th>
            <th>Prix (DH)</th>
            <th>Quantité</th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="produit : ${produits}">
            <td th:text="${produit.id}"></td>
            <td th:text="${produit.name}"></td>
            <td th:text="${#numbers.formatDecimal(produit.price, 1, 2)}"></td>
            <td th:text="${produit.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${produit.id})}"
                   class="btn btn-sm btn-warning">Modifier</a>
                <a th:href="@{/products/delete/{id}(id=${produit.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Confirmer la suppression de ce produit ?');">Supprimer</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(produits)}">
            <td colspan="5" class="text-center text-muted">Aucun produit trouvé</td>
        </tr>
        </tbody>
    </table>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
