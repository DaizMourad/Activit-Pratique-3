<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null} ? 'Ajouter un produit' : 'Modifier le produit'">Produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">

    <h2 class="mb-4" th:text="${product.id == null} ? 'Ajouter un produit' : 'Modifier le produit'"></h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" class="col-md-6">

        <!-- champ caché nécessaire pour la mise à jour (id existant) -->
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nom du produit</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Prix (DH)</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control"
                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantité</label>
            <input type="number" th:field="*{quantity}" class="form-control"
                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a th:href="@{/products}" class="btn btn-secondary">Annuler</a>

    </form>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
